spring:
  application:
    name: project-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:lcl}

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
        group:
          enabled: true

  devtools:
      restart:
        enabled: false
      livereload:
        enabled: false

  docker:
    compose:
      enabled: false

  datasource:
    platform: postgres
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations:
      - classpath:db/migration/common
      - classpath:db/migration/${spring.datasource.platform}
    baseline-on-migrate: true
    clean-disabled: false

  jackson:
    time-zone: UTC
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

app:
  security:
    users:
      - name: ${ADMIN_NAME}
        password: ${ADMIN_PASS}
        role: ADMIN

clients:
  member:
    url: ${MEMBER_CLIENT_URL}

resilience4j:
  circuitbreaker:
    instances:
      member-client:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - feign.FeignException$NotFound
  timelimiter:
    instances:
      member-client:
        timeout-duration: 3s
  retry:
    instances:
      member-client:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - java.io.IOException
          - feign.RetryableException

logging:
  level:
    root: INFO

server:
  port: 8080
