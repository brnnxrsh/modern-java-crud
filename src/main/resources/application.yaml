spring:
  application:
    name: project-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:lcl}

  devtools:
      restart:
        enabled: false
      livereload:
        enabled: false

  docker:
    compose:
      enabled: false

  datasource:
    platform: postgres
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations:
      - classpath:db/migration/common
      - classpath:db/migration/${spring.datasource.platform}
    baseline-on-migrate: true
    clean-disabled: false

  jackson:
    time-zone: UTC
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

app:
  security:
    users:
      - name: ${ADMIN_NAME}
        password: ${ADMIN_PASS}
        role: ADMIN

clients:
  member:
    url: ${MEMBER_CLIENT_URL}

logging:
  level:
    root: INFO

server:
  port: 8080
